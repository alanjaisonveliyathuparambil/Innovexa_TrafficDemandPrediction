<!DOCTYPE html>
<html>
<head>
    <title>Traffic Demand Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f3;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            width: 420px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }

        .note {
            font-size: 13px;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Traffic Demand Prediction</h1>

        <form action="/predict" method="post">
            <input type="number" name="junction" placeholder="Junction (1-4)" required>
            <input type="number" name="hour" placeholder="Hour (0-23)" required>
            <input type="number" name="day" placeholder="Day (1-31)" required>
            <input type="number" name="month" placeholder="Month (1-12)" required>
            <input type="number" name="year" placeholder="Year (2015-2017)" required>
            <input type="number" name="day_of_week" placeholder="Day of Week (0=Mon, 6=Sun)" required>

            <button type="submit">Predict Traffic</button>
        </form>

        {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
        {% endif %}

        <div class="note">
            Enter traffic-related details to predict expected vehicle count.
        </div>
    </div>

</body>
</html>
